<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoldayız — Rehber</title>
  <meta name="description" content="Bu rehber içeriğini Yoldayız uygulamasında görüntüle.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F4F2F1;
      color: #191015;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
    }
    .icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #C76542, #A54F31);
      border-radius: 18px;
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 36px; height: 36px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #564E4A; margin-bottom: 28px; line-height: 1.5; }
    .buttons { display: flex; flex-direction: column; gap: 12px; }
    a {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 14px 24px; border-radius: 14px;
      text-decoration: none; font-weight: 600; font-size: .95rem;
      transition: transform .2s;
    }
    a:hover { transform: translateY(-1px); }
    a svg { width: 22px; height: 22px; }
    .apple { background: #191015; color: #fff; }
    .google { background: #fff; color: #191015; border: 1.5px solid #D7CEC9; }
    .spinner { display: none; margin: 20px auto 0; color: #978F8A; font-size: .85rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 48 48" fill="none"><path d="M24 6l12 20H12L24 6z" fill="#fff" opacity=".9"/><path d="M16 26l8 16 8-16" fill="#fff" opacity=".6"/></svg>
    </div>
    <h1>Yoldayız'da Aç</h1>
    <p>Bu rehber içeriğini görüntülemek için Yoldayız uygulamasını indirin.</p>
    <div class="buttons">
      <a href="https://apps.apple.com/us/app/yolday%C4%B1z/id6752034533" class="apple">
        <svg viewBox="0 0 28 28" fill="currentColor"><path d="M21.3 14.8c0-3.1 2.5-4.6 2.6-4.7-1.4-2.1-3.6-2.3-4.4-2.4-1.9-.2-3.6 1.1-4.6 1.1-.9 0-2.4-1.1-3.9-1C9.1 8 7.3 9.2 6.3 11c-2.1 3.7-.5 9.1 1.5 12.1 1 1.5 2.2 3.1 3.8 3 1.5-.1 2.1-1 3.9-1s2.3 1 3.9 1c1.6 0 2.7-1.5 3.7-3 1.2-1.7 1.6-3.3 1.7-3.4 0 0-3.2-1.2-3.5-4.9zM18 6.3c.8-1 1.4-2.4 1.2-3.8-1.2 0-2.6.8-3.5 1.8-.7.8-1.4 2.2-1.2 3.5 1.4.1 2.7-.7 3.5-1.5z"/></svg>
        App Store
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.omerenlicay.campingapp" class="google">
        <svg viewBox="0 0 28 28" fill="none"><path d="M4.3 3.3C4.1 3.6 4 4 4 4.5v19c0 .5.1.9.3 1.2l.1.1L15 14.2v-.4L4.4 3.2l-.1.1z" fill="#4285F4"/><path d="M18.5 17.8L15 14.2v-.4l3.5-3.6.1 0 4.2 2.4c1.2.7 1.2 1.8 0 2.5l-4.2 2.4 0 .3z" fill="#FBBC04"/><path d="M18.6 17.5L15 14 4.3 24.7c.4.4 1 .5 1.7.1l12.6-7.3" fill="#EA4335"/><path d="M18.6 10.5L6 3.2C5.3 2.8 4.7 2.9 4.3 3.3L15 14l3.6-3.5z" fill="#34A853"/></svg>
        Google Play
      </a>
    </div>
    <p class="spinner" id="spinner">Uygulama açılıyor...</p>
  </div>

  <script>
    (function() {
      var path = window.location.pathname;
      var id = path.split('/').filter(Boolean).pop();
      var deepLink = 'yoldayiz://guide/' + id;
      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      if (id && (isIOS || isAndroid)) {
        document.getElementById('spinner').style.display = 'block';
        window.location.href = deepLink;
        setTimeout(function() {
          document.getElementById('spinner').style.display = 'none';
        }, 1500);
      }
    })();
  </script>
</body>
</html>
